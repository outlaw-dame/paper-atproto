<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Glimpse — Offline</title>
    <style>
      :root {
        --bg: #F2F2F7;
        --fg: #1C1C1E;
        --accent: #007AFF;
        --muted: #8E8E93;
        --card: #FFFFFF;
        --radius: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --fg: #FFFFFF;
          --accent: #0A84FF;
          --muted: #8E8E93;
          --card: #1C1C1E;
        }
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        /* system-ui resolves to SF Pro on Apple, Roboto on Android */
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--fg);
        color-scheme: light dark;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        /* All four safe-area insets so landscape iPhones/iPads are covered */
        padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
      }
      .card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 32px 24px;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 16px;
        display: block;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 24px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        /* 16px floor prevents iOS auto-zoom on focus */
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        /* Apple HIG: minimum touch target is 44pt */
        min-height: 44px;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon" aria-hidden="true">📡</span>
      <h1>You're offline</h1>
      <p>Glimpse couldn't reach the network. Your cached posts and data are still available once you reconnect.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
