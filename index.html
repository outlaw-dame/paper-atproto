<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), browsing-topics=()" />
    <meta name="color-scheme" content="light dark" />
    <!-- Dual theme-color so the browser chrome adapts without waiting for JS -->
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: content renders edge-to-edge under the status bar;
         safe-area-inset-top (wired via --safe-top in globals.css) provides the offset. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glimpse" />
    <!-- CSP is delivered via HTTP headers (/_headers), not meta tags -->
    <title>Glimpse — ATProto</title>
    <meta name="description" content="A Paper x Gist x Apple HIG client for the AT Protocol" />
    <script>(function(){var dark=window.matchMedia('(prefers-color-scheme: dark)').matches;var themeColor=dark?'#000000':'#F2F2F7';if(dark) document.documentElement.classList.add('dark');document.documentElement.style.background=themeColor;document.documentElement.style.backgroundColor=themeColor;})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Glympse type system: Plus Jakarta Sans (UI) + Newsreader (editorial) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
